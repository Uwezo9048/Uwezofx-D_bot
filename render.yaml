services:
  - name: uwezo-deriv-bot
    type: web
    runtime: python
    plan: free
    autoDeployTrigger: commit
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir webapp --bind 0.0.0.0:$PORT app:app
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: DERIV_APP_ID
        sync: false
      - key: DERIV_PAT_APP_ID
        sync: false
      - key: DERIV_OAUTH_APP_ID
        sync: false
      - key: DERIV_LEGACY_APP_ID
        sync: false

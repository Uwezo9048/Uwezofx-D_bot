{% extends "base.html" %}
{% block title %}Login | UWEZO-FX{% endblock %}
{% block content %}
<main class="auth-wrap">
    <section class="card auth-card">
        <div class="logo-lockup">
            <img src="{{ url_for('static', filename='images/icon.png') }}" alt="UWEZO-FX logo" class="page-logo">
            <div class="brand-mark">UWEZO-FX DERIV BOT</div>
        </div>
        <h1>Deriv Trading Console</h1>
        <p class="muted">Market analysis, bot controls, and live account metrics in one console.</p>

        <form method="post" class="auth-form">
            <label>
                <span>Username</span>
                <input type="text" name="username" placeholder="Enter username">
            </label>

            <label>
                <span>Login Code</span>
                <div class="password-field">
                    <input id="login-code-input" type="password" name="login_code" placeholder="Enter login code">
                    <button id="toggle-login-code" class="password-toggle" type="button" aria-label="Show login code">Show</button>
                </div>
            </label>

            <div class="button-row">
                <button class="btn btn-primary" type="submit">Login</button>
                <a class="btn btn-success" href="{{ url_for('register') }}">Create Account</a>
                <a class="btn btn-info" href="{{ url_for('reset_password') }}">Request Login Code</a>
            </div>
        </form>
    </section>
</main>
<script>
    const loginCodeInput = document.getElementById("login-code-input");
    const toggleLoginCode = document.getElementById("toggle-login-code");

    toggleLoginCode?.addEventListener("click", () => {
        const isHidden = loginCodeInput.type === "password";
        loginCodeInput.type = isHidden ? "text" : "password";
        toggleLoginCode.textContent = isHidden ? "Hide" : "Show";
        toggleLoginCode.setAttribute("aria-label", isHidden ? "Hide login code" : "Show login code");
    });
</script>
{% endblock %}

{% extends "base.html" %}
{% block title %}Request Login Code | UWEZO-FX{% endblock %}
{% block content %}
<main class="auth-wrap">
    <section class="card auth-card">
        <h1>Request Login Code</h1>
        <p class="muted">Enter your username and phone number so admin can resend your login code.</p>
        <form method="post" class="auth-form">
            <label>
                <span>Username</span>
                <input type="text" name="username" placeholder="Enter your username">
            </label>
            <label>
                <span>Phone Number</span>
                <input type="tel" name="phone" placeholder="+254...">
            </label>
            <div class="button-row">
                <button class="btn btn-primary" type="submit">Request Code</button>
                <a class="btn btn-ghost" href="{{ url_for('login') }}">Back to Login</a>
            </div>
        </form>
    </section>
</main>
{% endblock %}
